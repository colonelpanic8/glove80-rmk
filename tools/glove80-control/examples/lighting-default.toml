# Glove80 persistent lighting configuration — canonical TOML form.
#
# This file approximates the firmware's compiled-in defaults (thumb-cluster
# base in dim white, per-layer accents on the keys nearest the thumbs), so a
# first `glove80-control config apply examples/lighting-default.toml` looks
# like the stock lighting and gives you a starting point to edit.
#
# Key indices are chain positions 0-79: left half 0-39, right half 40-79.
# Chain indices 0-5 are the six thumb keys of each half (top row 0 1 2,
# bottom row 3 4 5); 6-9 is the inner main-grid column nearest the thumbs.
#
# Record order = composition order: later records within the same activation
# class win on overlapping keys. Comments (and toggle names) live only in
# this file — they are not stored on the device and are lost on export.
#
# Workflow:
#   glove80-control config validate lighting-default.toml   # offline check
#   glove80-control config apply lighting-default.toml      # transactional
#   glove80-control config show                             # read back
#   glove80-control config export backup.toml               # backup

# --- Toggle persistence -----------------------------------------------------
# Uncomment to make toggle 0 keep its runtime state across reboots, or to
# boot with a toggle already on. Unlisted toggles neither persist nor start
# on. `name` is optional documentation.
#
# [[toggle]]
# id = 0
# name = "caps-hint"
# persist = true
#
# [[toggle]]
# id = 1
# initial_on = true

# --- Base: all six thumb keys of both halves, dim white ---------------------
[[record]]
activation = "always"
cells = [
  { keys = "0-5,40-45", color = "#181818" },
]

# --- Per-layer accents ------------------------------------------------------
# Top thumb row (0-2) plus the inner main-grid column (6-9) on each half, in
# the active layer's color. Layer order matches keyboard.toml.

[[record]] # layer 0: Base — blue
activation = { layer = 0 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#0000ff" }]

[[record]] # layer 1: Lower — green
activation = { layer = 1 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#00ff00" }]

[[record]] # layer 2: Magic — magenta
activation = { layer = 2 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff00ff" }]

[[record]] # layer 3: Games — red
activation = { layer = 3 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff0000" }]

[[record]] # layer 4: Mac Hyper — cyan
activation = { layer = 4 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#00ffff" }]

[[record]] # layer 5 — amber
activation = { layer = 5 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff8000" }]

[[record]] # layer 6 — chartreuse
activation = { layer = 6 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#80ff00" }]

[[record]] # layer 7 — white
activation = { layer = 7 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ffffff" }]
