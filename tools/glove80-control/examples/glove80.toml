[[layer]]
id = "games"
name = "Games"
keys = """
_______  _______  _______  _______  _______  --       _______  _______  --       _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  _______  KC_W     _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  KC_A     KC_S     KC_D     _______  _______  KC_SPC   _______  _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  --       _______  _______  --       _______  _______  _______  _______  _______
"""

# --- Layer 4: Mac Hyper ------------------------------------------------------
[[layer]]
id = "mac_hyper"
name = "Mac Hyper"
keys = """
_______  _______  _______  _______  _______  --       _______  _______  --       _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  TG(4)    _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______  _______
_______  _______  _______  _______  _______  --       _______  LALT(LGUI(KC_LCTL))  --  _______  _______  _______  _______  _______
"""

# --- Lighting ----------------------------------------------------------------
# Key indices here are LED chain positions 0-79 (left half 0-39, right half
# 40-79; 0-5 are each half's six thumb keys, 6-9 the inner main-grid
# column). Record order = composition order.

# Base: all six thumb keys of both halves, dim white.
[[record]]
activation = "always"
cells = [{ keys = "0-5,40-45", color = "#181818" }]

# Per-layer accents on the top thumb row + inner column, referencing the
# layers above by stable id (slots 5-7 have no [[layer]] entry, so they use
# literal slot numbers).
[[record]] # Base — blue
activation = { layer = "base" }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#0000ff" }]

[[record]] # Lower — green
activation = { layer = "lower" }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#00ff00" }]

[[record]] # Magic — magenta
activation = { layer = "magic" }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff00ff" }]

[[record]] # Games — red
activation = { layer = "games" }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff0000" }]

[[record]] # Mac Hyper — cyan
activation = { layer = "mac_hyper" }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#00ffff" }]

[[record]] # slot 5 — amber
activation = { layer = 5 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ff8000" }]

[[record]] # slot 6 — chartreuse
activation = { layer = 6 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#80ff00" }]

[[record]] # slot 7 — white
activation = { layer = 7 }
cells = [{ keys = "0-2,6-9,40-42,46-49", color = "#ffffff" }]

# --- Optional press-and-hold status panel -----------------------------------
