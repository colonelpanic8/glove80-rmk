CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y
CONFIG_ZMK_STUDIO=y
# Eight host-lighting pixel updates encode to more than Studio's 30-byte
# default. Leave headroom for framing escape bytes so the UART ISR never drops
# a partial RPC and strands the decoder waiting for its terminator.
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128
CONFIG_ZMK_HOST_LIGHTING=y
CONFIG_ZMK_MAINTENANCE_RPC=y
