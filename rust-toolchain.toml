[toolchain]
# Pinned like crates/glove80-rmk: this machine's
# rustup "stable" channel install is broken (channel sync fails), and a
# concrete version keeps builds reproducible. Nested rust-toolchain.toml
# files (such as the firmware's) still take precedence when entered directly.
channel = "1.97.0"
components = ["clippy", "rust-src", "rustfmt"]
targets = ["thumbv7em-none-eabihf"]
