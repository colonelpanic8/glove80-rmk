syntax = "proto3";

package zmk.host_lighting;

message Request {
    oneof request_type {
        bool get_capabilities = 1;
        SetPixelsRequest set_pixels = 2;
        bool clear = 3;
    }
}

message Response {
    oneof response_type {
        Capabilities get_capabilities = 1;
        ApplyResult set_pixels = 2;
        ApplyResult clear = 3;
    }
}

message Pixel {
    uint32 index = 1;
    uint32 rgb = 2;
}

message SetPixelsRequest {
    repeated Pixel pixels = 1;
    bool replace = 2;
    uint32 timeout_ms = 3;
}

message Capabilities {
    uint32 protocol_version = 1;
    uint32 pixel_count = 2;
    uint32 pixels_per_half = 3;
    uint32 max_updates_per_request = 4;
    uint32 max_update_hz = 5;
    uint32 default_timeout_ms = 6;
    uint32 max_timeout_ms = 7;
    uint32 max_channel_value = 8;
    bool supports_replace = 9;
    bool supports_split = 10;
}

enum ApplyResult {
    APPLY_RESULT_OK = 0;
    APPLY_RESULT_INVALID_PIXEL = 1;
    APPLY_RESULT_PARTIAL = 2;
    APPLY_RESULT_PERIPHERAL_UNAVAILABLE = 3;
    APPLY_RESULT_INTERNAL_ERROR = 4;
}
