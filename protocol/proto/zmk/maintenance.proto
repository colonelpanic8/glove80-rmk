syntax = "proto3";

package zmk.maintenance;

enum BootloaderTarget {
    BOOTLOADER_TARGET_LEFT = 0;
    BOOTLOADER_TARGET_RIGHT = 1;
}

message Request {
    oneof request_type {
        BootloaderTarget enter_bootloader = 1;
    }
}

message Response {
    oneof response_type {
        bool enter_bootloader = 1;
    }
}
