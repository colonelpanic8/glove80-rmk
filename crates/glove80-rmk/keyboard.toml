# MoErgo Glove80 — RMK spike configuration.
#
# Hardware facts are transcribed from the ZMK board definition in
# the legacy glove80-config zmk/app/boards/arm/glove80/ files. The logical layout
# is the same 6x14 grid used by the ZMK matrix transform: columns 0-6 are the
# left half (column 6 = left thumb cluster), columns 7-13 are the right half
# (column 7 = right thumb cluster). Grid positions (0,5), (0,8), (5,5) and
# (5,8) have no physical switch.

[keyboard]
name = "Glove80"
product_name = "Glove80"
vendor_id = 0x16c0
product_id = 0x27db
manufacturer = "MoErgo"
chip = "nrf52840"

[rmk]
# The right half carries both input and replicated lighting state over the
# split link. On USB power attend every 7.5 ms event; on battery allow one
# skipped event (15 ms maximum interval) to retain some radio savings.
split_central_max_latency_powered = 0
split_central_max_latency_battery = 1

[layout]
rows = 6
cols = 14
map = """
(0,0) (0,1) (0,2) (0,3) (0,4)       (0,6) (0,7)       (0,9) (0,10) (0,11) (0,12) (0,13)
(1,0) (1,1) (1,2) (1,3) (1,4) (1,5) (1,6) (1,7) (1,8) (1,9) (1,10) (1,11) (1,12) (1,13)
(2,0) (2,1) (2,2) (2,3) (2,4) (2,5) (2,6) (2,7) (2,8) (2,9) (2,10) (2,11) (2,12) (2,13)
(3,0) (3,1) (3,2) (3,3) (3,4) (3,5) (3,6) (3,7) (3,8) (3,9) (3,10) (3,11) (3,12) (3,13)
(4,0) (4,1) (4,2) (4,3) (4,4) (4,5) (4,6) (4,7) (4,8) (4,9) (4,10) (4,11) (4,12) (4,13)
(5,0) (5,1) (5,2) (5,3) (5,4)       (5,6) (5,7)       (5,9) (5,10) (5,11) (5,12) (5,13)
"""

[keymap]
layers = 8
# Ported from legacy glove80-config/config/glove80.keymap. Layers: 0 Base,
# 1 Lower, 2 Magic,
# 3 Games, 4 Mac Hyper. Layers 5-7 are unassigned editable capacity.
# Substitutions from the ZMK keymap:
#   - &magic hold-tap        -> MO(2) plus board-local lighting wake/status
#   - &bt_0..&bt_3           -> User0..User3 (RMK BLE profile select)
#   - &bt BT_CLR / BT_CLR_ALL-> User10 / User11 (profile clear actions)
#   - &out OUT_USB           -> OutputUsb
#   - left &bootloader       -> Bootloader
#   - right &bootloader      -> User12 (forwarded to the peripheral)
#   - &sys_reset             -> Reboot
#   - Games+MacHyper conditional layer is not ported (no RMK equivalent).
[[keymap.layer]]
name = "Base"
keys = """
F1 F2 F3 F4 F5 LT(1, Escape) Backspace F6 F7 F8 F9 F10
Equal Kc1 Kc2 Kc3 Kc4 Kc5 Delete TG(4) Kc6 Kc7 Kc8 Kc9 Kc0 Minus
Tab Q W E R T MO(2) LGui Y U I O P Backslash
LCtrl A S D F G Backspace Space H J K L LT(1, Semicolon) Quote
LShift Z X C V B LGui Enter N M Comma Dot Slash RShift
Grave Home End Left Right LAlt RGui Up Down LeftBracket RightBracket TG(3)
"""

[[keymap.layer]]
name = "Lower"
keys = """
_ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ WM(Equal, LShift) WM(Minus, LShift) WM(Kc9, LShift) WM(Kc0, LShift) _ TO(0) _ _ _ _ _ _ _
CapsLock WM(Kc1, LShift) WM(Kc2, LShift) WM(Kc3, LShift) WM(Kc4, LShift) WM(Kc5, LShift) _ MediaPlayPause WM(Kc6, LShift) WM(Kc7, LShift) WM(Kc8, LShift) WM(Kc9, LShift) WM(Kc0, LShift) _
_ LeftBracket RightBracket WM(LeftBracket, LShift) WM(RightBracket, LShift) _ _ _ _ _ _ _ _ _
_ _ _ MediaPrevTrack MediaNextTrack _ _ AudioVolUp AudioVolDown _ _ _
"""

[[keymap.layer]]
name = "Magic"
keys = """
User10 User13 No No No User2 No No No No No User11
No No No No No No User3 No No No No No No No
No No No No No No No No No No No No No No
Bootloader No No No No No User0 No No No No No No User12
Reboot No No No No No User1 No No No No No No Reboot
No No No No No OutputUsb No No No No No TO(3)
"""

[[keymap.layer]]
name = "Games"
keys = """
_ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ _ W _ _ _ _ _ _ _ _ _ _ _
_ A S D _ _ Space _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _
"""

[[keymap.layer]]
name = "Mac Hyper"
keys = """
_ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ TG(4) _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ _ _ _ _ _ _ _ _
_ _ _ _ _ _ WM(LCtrl, LGui | LAlt) _ _ _ _ _
"""

# The local lighting processor and the central semantic-replication task both
# subscribe. Split and Rynk feature additions are accounted for separately by
# RMK's subscriber resolver.
[event.layer_change]
channel_size = 4
pubs = 2
subs = 3

# Replication exports a fresh authoritative snapshot after engine mutations.
[event.lighting_changed]
channel_size = 2
pubs = 1
subs = 2

# Indicator state is part of the renderer snapshot, so the central replica
# task needs one slot beyond the existing lighting/Rynk/split consumers.
[event.led_indicator]
channel_size = 3
pubs = 2
subs = 4

# MagicKeyActions consumes resolved User12/User13 and Magic-layer actions.
[event.action]
channel_size = 16
pubs = 1
subs = 1

# The information-lighting state tracks both halves' live battery reports.
[event.battery_status]
channel_size = 2
pubs = 1
subs = 1

[event.peripheral_battery]
channel_size = 3
pubs = 1
subs = 3

[storage]
enabled = true
# ZMK storage partition: 0xec000-0xf4000 (eight 4 KiB sectors, ends at the
# bootloader). The runtime-config partition at 0xdc000 stays reserved.
start_addr = 0xec000
num_sectors = 8

[ble]
enabled = true

[host]
vial_enabled = false
rynk_enabled = true
# Storage reset and matrix-state reads require deliberate physical presence.
# Firmware deployment is intentionally host-driven on this keyboard, so both
# halves may enter their UF2 bootloaders programmatically without a key chord.
insecure = false
unlock_keys = [[0, 0], [0, 13]]
bootloader_requires_unlock = false

[split]
connection = "ble"

# Left half: central (USB + BLE).
[split.central]
rows = 6
cols = 7
row_offset = 0
col_offset = 0
# Static random BLE address for the split link ("GLV80" + 0x01).
ble_addr = [0x01, 0x30, 0x38, 0x56, 0x4c, 0xc7]
# Battery is measured on the internal VDDH/5 channel (ZMK: battery-nrf-vddh).
battery_adc_pin = "vddh"

[split.central.matrix]
matrix_type = "normal"
# From glove80_lh.dts kscan0 (col2row, rows input pull-down).
row_pins = ["P0_26", "P0_05", "P0_06", "P0_08", "P0_07", "P1_09"]
col_pins = ["P1_08", "P1_04", "P1_06", "P1_07", "P1_05", "P1_03", "P1_01"]

# Right half: peripheral, columns 7-13 of the logical grid.
[[split.peripheral]]
rows = 6
cols = 7
row_offset = 0
col_offset = 7
ble_addr = [0x02, 0x30, 0x38, 0x56, 0x4c, 0xc7]
battery_adc_pin = "vddh"

[split.peripheral.matrix]
matrix_type = "normal"
# From glove80_rh.dts kscan0. Column 0 is the right thumb cluster.
row_pins = ["P0_26", "P0_05", "P0_07", "P1_08", "P0_11", "P0_12"]
col_pins = ["P1_06", "P1_04", "P0_02", "P1_07", "P1_05", "P1_03", "P1_01"]

# RMK-native board-wide lighting topology. Stable LED ids preserve the former
# host-overlay numbering: 0-39 are the left chain and 40-79 the right chain.
[lighting]
topology_revision = 1

[[lighting.zone]]
id = 1
name = "per-key"

[[lighting.output]]
node = 0
id = 0
pixel_count = 40
capabilities = ["rgb", "addressable"]

[[lighting.output]]
node = 1
id = 0
pixel_count = 40
capabilities = ["rgb", "addressable"]

[lighting.background]
# Keep every key visibly lit; sparse per-layer scenes below override this dim
# white base with their accent colors.
enabled = true
hue = 0
saturation = 0
value = 32
speed = 128
mode = "solid"

